<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>UniWallet - Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/dark.css">
</head>

<body>
    <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 90vh;">

        <h1 style="margin-bottom: 20px;">帳號登入</h1>
        <p id="message-box" style="display: none; font-weight: bold; padding: 10px 20px; border-radius: 4px; margin: 10px auto; text-align: center; max-width: 300px; border: 1px solid transparent;"></p>

        <form id="login-form" style="width: 300px; display: flex; flex-direction: column; margin: 0 auto;">            
            <input type="text" id="username" placeholder="帳號" required style="width: 100%; box-sizing: border-box; margin-bottom: 15px;">
            <input type="password" id="password" placeholder="密碼" required style="width: 100%; box-sizing: border-box; margin-bottom: 15px;">
            <div style="text-align: center; width: 100%;">
                <button type="submit" style="width: 100px; margin-top: 15px;">登入</button>
            </div>
        </form>

        <hr style="width: 300px; margin: 20px 0;">
        <p><a href="/">回首頁</a></p>
    </div>

    <script src="config.js"></script>
    <script>
        const messageBox = document.getElementById('message-box');

        function showMessage(text, type = 'error') {
            messageBox.innerText = text;
            messageBox.style.display = 'inline-block';
            if (type === 'error') {
                messageBox.style.color = '#ff6b6b';
                messageBox.style.background = '#ffe3e3';
            } else {
                messageBox.style.color = '#008000';
                messageBox.style.background = '#e3fff0';
            }
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            messageBox.style.display = 'none';

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${CONFIG.API_HOST}/api/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password }),
                    credentials: 'include'
                });

                const data = await response.json();

                if (response.ok) {
                    window.location.href = 'wallet.html';
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (error) {
                console.error('無法連接到後端 API:', error);
                showMessage('無法連接到伺服器，請檢查網路連線。', 'error');
            }
        });
    </script>

</body>
</html>
